        function getSimilarity(target, transcribed) {
            let s1 = target.toLowerCase().replace(/[^a-z0-9]/g, '');
            let s2 = transcribed.toLowerCase().replace(/[^a-z0-9]/g, '');
            
            if (s1.length === 0 && s2.length === 0) return 100;
            if (s1.length === 0 || s2.length === 0) return 0;
            
            let longer = s1;
            let shorter = s2;
            if (s1.length < s2.length) { longer = s2; shorter = s1; }
            
            const costs = [];
            for (let i = 0; i <= longer.length; i++) {
                let lastValue = i;
                for (let j = 0; j <= shorter.length; j++) {
                    if (i === 0) costs[j] = j;
                    else {
                        if (j > 0) {
                            let newValue = costs[j - 1];
                            if (longer.charAt(i - 1) !== shorter.charAt(j - 1))
                                newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                            costs[j - 1] = lastValue;
                            lastValue = newValue;
                        }
                    }
                }
                if (i > 0) costs[shorter.length] = lastValue;
            }
            const distance = costs[shorter.length];
            return Math.round(((longer.length - distance) / parseFloat(longer.length)) * 100);
        }

                let textToSpeak = word;
                if (word.trim().toLowerCase() === "hi!" || word.trim().toLowerCase() === "hi") {
                    textToSpeak = "Hello, hi."; 
                }

                const utterance = new SpeechSynthesisUtterance(textToSpeak);
                utterance.lang = 'en-US';
                utterance.rate = 0.85; 
                utterance.pitch = 1.1; 
                
                if(!femaleVoice) setPreferredVoice(); 
                if(femaleVoice) utterance.voice = femaleVoice;

                window.speechSynthesis.speak(utterance);
            } else {
                alert("Seu navegador não suporta áudio nativo.");
            }
        }

        // ==========================================
        // MOTOR DE GRAVAÇÃO E AVALIAÇÃO DE PRONÚNCIA
        // ==========================================
        let globalMediaRecorder = null;
        let globalAudioChunks = [];
        let activeRecordId = null;
        let activeRecordBtnId = null;
        let currentTargetText = "";
        const userAudioBlobs = {};

        async function toggleRecording(btnId, wordId, targetText) {
            const btn = document.getElementById(btnId);
            const feedbackEl = document.getElementById(`feedback-${wordId}`);

            // Se já estiver gravando
            if (globalMediaRecorder && globalMediaRecorder.state === "recording") {
                globalMediaRecorder.stop();
                if (globalRecognition) {
                    try { globalRecognition.stop(); } catch(e){}
                }

                if (activeRecordBtnId) {
                    const oldBtn = document.getElementById(activeRecordBtnId);
                    if (oldBtn) {
                        oldBtn.innerHTML = '<i class="fa-solid fa-microphone"></i>';
                        oldBtn.classList.remove('bg-red-500', 'text-white', 'recording-pulse');
                        oldBtn.classList.add('bg-red-50', 'text-red-500');
                    }
                }
                
                if (activeRecordId === wordId) {
                    activeRecordId = null;
                    activeRecordBtnId = null;
                    if(feedbackEl) {
                        feedbackEl.classList.remove('hidden');
                        feedbackEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processando a sua pronúncia...';
                        feedbackEl.className = "mt-3 text-center text-[11px] font-bold rounded-lg py-2 px-3 bg-gray-100 text-gray-500 w-full transition-all";
                    }
                    return;
                }
            }

            // Iniciar nova gravação
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                globalMediaRecorder = new MediaRecorder(stream);
                activeRecordId = wordId;
                activeRecordBtnId = btnId;
                currentTargetText = targetText || "";
                globalAudioChunks = [];
                transcriptResult = "";

                // Configurar Reconhecimento de Voz (Transcição)
                if (SpeechRecognition) {
                    globalRecognition = new SpeechRecognition();
                    globalRecognition.lang = 'en-US';
                    globalRecognition.interimResults = false;
                    globalRecognition.maxAlternatives = 1;
                    globalRecognition.onresult = function(event) {
                        transcriptResult = event.results[0][0].transcript;
                    };
                    try { globalRecognition.start(); } catch(e){}
                }

                globalMediaRecorder.ondataavailable = (e) => {
                    if (e.data.size > 0) globalAudioChunks.push(e.data);
                };

                globalMediaRecorder.onstop = () => {
                    const audioBlob = new Blob(globalAudioChunks, { type: 'audio/webm' });
                    userAudioBlobs[activeRecordId] = URL.createObjectURL(audioBlob);

                    const pBtn = document.getElementById(`play-self-${activeRecordId}`);
                    if (pBtn) {
                        pBtn.disabled = false;
                        pBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'bg-gray-100', 'text-gray-400');
                        pBtn.classList.add('bg-emerald-100', 'text-emerald-600', 'hover:bg-emerald-200', 'shadow-md');
                    }
                    stream.getTracks().forEach(track => track.stop());

                    // FEEDBACK VISUAL DE PONTUAÇÃO
                    setTimeout(() => {
                        const feedbackElPost = document.getElementById(`feedback-${activeRecordId}`);
                        if(feedbackElPost) {
                            if(!SpeechRecognition) {
                                feedbackElPost.className = "mt-3 text-center text-[10px] font-bold rounded-lg py-2 px-3 bg-slate-100 text-slate-500 w-full";
                                feedbackElPost.innerHTML = "🎙️ Escute a sua gravação para comparar (Avaliação de % não suportada no seu navegador).";
                            } else if (!transcriptResult) {
                                feedbackElPost.className = "mt-3 text-center text-[11px] font-bold rounded-lg py-2 px-3 bg-amber-50 text-amber-600 border border-amber-200 w-full";
                                feedbackElPost.innerHTML = "🤫 Não ouvi bem. Fale mais alto ou mais perto do microfone!";
                            } else {
                                const score = getSimilarity(currentTargetText, transcriptResult);
                                if (score >= 85) {
                                    feedbackElPost.className = "mt-3 text-center text-[12px] font-black rounded-lg py-2 px-3 bg-emerald-100 text-emerald-700 border border-emerald-300 w-full shadow-sm";
                                    feedbackElPost.innerHTML = `🏆 ${score}% - Perfeito! Pronúncia exata!`;
                                } else if (score >= 40) {
                                    feedbackElPost.className = "mt-3 text-center text-[11px] font-bold rounded-lg py-2 px-3 bg-yellow-50 text-yellow-700 border border-yellow-300 w-full";
                                    feedbackElPost.innerHTML = `🌟 ${score}% - Quase lá! Faça novamente para ficar verde e chegar nos 100%!`;
                                } else {
                                    feedbackElPost.className = "mt-3 text-center text-[11px] font-bold rounded-lg py-2 px-3 bg-rose-50 text-rose-700 border border-rose-300 w-full";
                                    feedbackElPost.innerHTML = `💪 ${score}% - Continue treinando! Escute o nativo e repita.`;
                                }
                            }
                        }
                    }, 500); // Pequeno delay para dar tempo ao SpeechRecognition de terminar
                };

                globalMediaRecorder.start();
                
                // Esconder feedback anterior e mostrar botão gravando
                if(feedbackEl) feedbackEl.classList.add('hidden');
                btn.innerHTML = '<i class="fa-solid fa-stop"></i>';
                btn.classList.remove('bg-red-50', 'text-red-500');
                btn.classList.add('bg-red-500', 'text-white', 'recording-pulse');

            } catch (err) {
                console.error(err);
                alert("Permita o acesso ao microfone no seu navegador para poder gravar e testar a sua pronúncia.");
            }
        }

        function playSelf(wordId) {
            if (userAudioBlobs[wordId]) {
                const audio = new Audio(userAudioBlobs[wordId]);
                audio.play();
            } else {
                alert("Grave a sua voz primeiro clicando no microfone!");
            }
        }

        // ==========================================
        // GESTÃO DE INTERFACE (MÓDULOS)
        // ==========================================
        const inglesModules = [
            { id: 0, title: "Boas-vindas", icon: "fa-flag-usa" },
            { id: 1, title: "Módulo 1: A Base (Pronomes e Verbos)", icon: "fa-person-running" },

        let completedIngles = new Set(JSON.parse(localStorage.getItem('neuroInglesProgress')) || []);

        function renderNav() {
            const nav = document.getElementById('module-nav');
            nav.innerHTML = '';
            
            inglesModules.forEach(m => {

                        <i class="fa-solid fa-circle-check ${isCompleted ? 'text-blue-500' : 'text-gray-200'}"></i>
                    </button>
                `;
            });
        }

        function updateProgressBar() {
            const total = 6; 
            let percentage = (completedIngles.size / total) * 100;
            if(percentage > 100) percentage = 100;
            
            document.getElementById('progress-bar').style.width = `${percentage}%`; 
            document.getElementById('progress-text').innerText = `${Math.round(percentage)}%`;

            // MENSAGENS MOTIVACIONAIS DO PROGRESSO GERAL
            const feedbackProgress = document.getElementById('progress-feedback-msg');
            if (feedbackProgress) {
                if (percentage === 0) feedbackProgress.innerText = "Vamos começar a sua jornada! 🚀";
                else if (percentage < 30) feedbackProgress.innerText = "Ótimo começo! Continue firme! 💪";
                else if (percentage < 60) feedbackProgress.innerText = `Você já concluiu ${Math.round(percentage)}% do caminho! 🌟`;
                else if (percentage < 100) feedbackProgress.innerText = `Falta pouco! Quase nos 100%! 🔥`;
                else feedbackProgress.innerText = "Incrível! Você completou 100%! 🏆";
            }
        }

        function completeModule(index) {
            completedIngles.add(index);
            localStorage.setItem('neuroInglesProgress', JSON.stringify([...completedIngles]));

            updateProgressBar();
            renderModuleContent(index);

                        <div class="bg-white text-blue-900 p-6 md:p-8 rounded-3xl shadow-lg text-left relative z-10 mb-8">

                            <p class="text-lg mb-4">Embaixo de cada palavra ou frase deste curso, você encontrará o nosso <strong>Painel de Treino</strong> exclusivo com três botões:</p>

                        <div class="mb-8 border-b border-gray-100 pb-6">
                            <span class="text-blue-500 font-bold uppercase tracking-widest text-xs mb-1 block">Ferramenta Livre</span>
                            <h2 class="text-3xl md:text-4xl font-extrabold text-blue-900"><i class="fa-solid fa-robot mr-3 text-blue-400"></i> Tradutor Fonético IA ✨</h2>
                            <p class="text-gray-600 mt-4 text-lg">Escreva qualquer frase em Português. A nossa IA traduz, mostra a fonética abrasileirada e avalia a sua pronúncia com a pontuação 0 a 100%!</p>
                        </div>
                        
                        <div class="bg-blue-50 rounded-3xl p-6 border border-blue-100 shadow-inner">
                            <label for="ai-english-input" class="block text-blue-900 font-bold mb-3 text-xl">O que você deseja aprender a falar hoje?</label>
                            <textarea id="ai-english-input" rows="3" class="w-full p-5 rounded-2xl border-2 border-blue-200 focus:border-blue-500 outline-none transition-all resize-none text-gray-700 font-medium text-lg" placeholder="Ex: Onde fica o supermercado mais próximo?"></textarea>
                            
                            <div class="flex justify-end mt-4">
                                <button onclick="generateEnglishTranslation()" id="btn-ai-english-translate" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-10 rounded-2xl transition-colors flex items-center justify-center w-full sm:w-auto shadow-md text-lg gap-3">
                                    Traduzir com IA ✨
                                </button>
                            </div>
                        </div>

                        <div id="ai-english-result-container" class="mt-8 hidden">
                            <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center"><i class="fa-solid fa-language text-blue-500 mr-3"></i> Resultado da Tradução:</h3>
                            <div id="ai-english-result-content" class="bg-white border-2 border-blue-100 p-6 md:p-8 rounded-3xl shadow-sm text-gray-700 text-lg">
                                <!-- Gerado pela IA -->
                            </div>
                        </div>

                        <div class="mt-16 flex justify-center">
                            <button onclick="completeModule(5)" class="${completedIngles.has(5) ? 'bg-amber-500 text-white' : 'bg-emerald-600 hover:bg-emerald-700 text-white'} font-black py-4 px-12 rounded-full shadow-lg hover:scale-105 transition-all uppercase tracking-widest">
                                ${completedIngles.has(5) ? '<i class="fa-solid fa-certificate mr-2"></i> Você já concluiu o curso!' : 'FINALIZAR CURSO DE INGLÊS'}
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        async function generateEnglishTranslation() {
            const inputEl = document.getElementById('ai-english-input');
            const btnEl = document.getElementById('btn-ai-english-translate');
            const resultContainer = document.getElementById('ai-english-result-container');
            const resultContent = document.getElementById('ai-english-result-content');
            
            const text = inputEl.value.trim();
            if(!text) return alert('Por favor, digite algo para traduzir!');

            btnEl.disabled = true;
            btnEl.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Processando...';
            
            resultContainer.classList.remove('hidden');
            resultContent.innerHTML = `
                <div class="flex flex-col items-center justify-center py-10">
                    <i class="fa-solid fa-robot fa-bounce text-5xl text-blue-300 mb-4"></i>
                    <p class="text-blue-600 font-bold animate-pulse text-center">Processando a tradução e fonética...<br><span class="text-sm text-blue-400 font-normal">Isso exige que a chave da API esteja configurada no código.</span></p>
                </div>`;

            const systemPrompt = `Você é um professor de Inglês neuroinclusivo. Retorne um JSON estruturado com:
{
    "translated": "A frase traduzida para inglês",
    "englishText": "A frase exata em inglês para usar no sintetizador de voz",
    "phonetic": "A fonética abrasileirada (ex: Uót is iór nêim?)"
}`;

            const payload = {
                contents: [{ parts: [{ text: text }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] },
                generationConfig: { temperature: 0.2, responseMimeType: "application/json" }
            };

            try {
                if(apiKey === "") throw new Error('API Key ausente');

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                
                if(!response.ok) throw new Error('Erro na API');
                
                const data = await response.json();
                const textResponse = data.candidates?.[0]?.content?.parts?.[0]?.text;
                if (textResponse) {
                    const parsed = JSON.parse(textResponse);
                    const uniqueId = 'ai-trans-1';
                    const safeEn = parsed.englishText.replace(/'/g, "\\'");
                    
                    resultContent.innerHTML = `
                        <div class="space-y-6">
                            <div class="bg-gray-50 p-5 rounded-2xl border border-gray-200 shadow-sm">
                                <p class="text-sm font-bold text-gray-500 uppercase tracking-widest mb-2">Em Inglês:</p>
                                <p class="text-3xl font-black text-gray-800">${parsed.translated}</p>
                            </div>
                            <div class="bg-blue-50 p-5 rounded-2xl border border-blue-200 shadow-inner">
                                <p class="text-sm font-bold text-blue-500 uppercase tracking-widest mb-2">Como se lê (Fonética):</p>
                                <p class="text-2xl font-bold text-blue-800 italic">"${parsed.phonetic}"</p>
                            </div>
                            <div class="flex flex-col pt-4 border-t border-gray-100">
                                <div class="flex items-center gap-3">
                                    <button onclick="playWord('${safeEn}')" class="flex-1 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-colors text-lg border border-blue-200 shadow-sm">
                                        <i class="fa-solid fa-headphones text-2xl"></i> Ouvir Nativo
                                    </button>
                                    <button id="btn-rec-${uniqueId}" onclick="toggleRecording('btn-rec-${uniqueId}', '${uniqueId}', \`${safeEn}\`)" class="flex-1 bg-red-50 hover:bg-red-100 text-red-600 font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-colors text-lg border border-red-200 shadow-sm">
                                        <i class="fa-solid fa-microphone text-2xl"></i> Gravar Voz
                                    </button>
                                    <button id="play-self-${uniqueId}" onclick="playSelf('${uniqueId}')" disabled class="flex-1 bg-gray-100 text-gray-400 opacity-50 cursor-not-allowed font-bold py-4 rounded-xl flex items-center justify-center gap-3 transition-all text-lg border border-gray-200 shadow-sm">
                                        <i class="fa-solid fa-play text-2xl"></i> Ouvir Gravação
                                    </button>
                                </div>
                                <div id="feedback-${uniqueId}" class="mt-3 text-center text-sm font-bold hidden rounded-lg py-3 px-3 w-full transition-all"></div>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                resultContent.innerHTML = '<div class="bg-red-50 text-red-600 p-4 rounded-lg flex items-center"><i class="fa-solid fa-triangle-exclamation text-2xl mr-3"></i> O Tradutor IA precisa da Chave de API Google configurada no código para funcionar no seu computador.</div>';
            }

            btnEl.disabled = false;
            btnEl.innerHTML = 'Traduzir com IA ✨';
        }

        // Iniciar App
        window.onload = () => {
            renderNav();
            updateProgressBar();
            renderModuleContent(0);
        };
    </script>
</body>
</html>
